<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odin Calculator | Armando Interaminense</title>
    <link rel="stylesheet" href="styles/styles.css">
</head>
<body>
    <h1>Calculator</h1>
    <div class="calculator">
        <div class="display"></div>
        <div class="buttons">
            <div class="row1">
                <button id="7">7</button>
                <button id="8">8</button>
                <button id="9">9</button>
                <button id="division" class="operator">÷</button>
            </div>
            <div class="row2">
                <button id="6">6</button>
                <button id="5">5</button>
                <button id="4">4</button>
                <button id="multiplication" class="operator">x</button>
            </div>
            <div class="row3">
                <button id="3">3</button>
                <button id="2">2</button>
                <button id="1">1</button>
                <button id="subtraction" class="operator">-</button>
            </div>
            <div class="row4">
                <button id="0">0</button>
                <button id="dot">.</button>
                <button id="equal-sign">=</button>
                <button id="addition" class="operator">+</button>
            </div>
        </div>
    </div>
    <script src="js/javascript.js"></script>
</body>
</html>
